<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infinite Runner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: sans-serif; }
    #renderCanvas { width: 100vw; height: 100vh; display: block; }

    /* HUD */
    #hud {
      position: absolute;
      top: 20px; left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 24px;
      font-weight: bold;
      pointer-events: none;
    }

    #powerupDisplay {
      position: absolute;
      top: 55px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 36px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    /* Écran de démarrage */
    #startScreen, #gameoverScreen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.6);
      color: #fff;
      gap: 20px;
    }
    #gameoverScreen { display: none; }

    h1 { font-size: 48px; letter-spacing: 4px; }
    h2 { font-size: 36px; }
    p  { font-size: 18px; color: #aaa; }

    button {
      padding: 12px 40px;
      font-size: 20px;
      border: 2px solid #fff;
      background: transparent;
      color: #fff;
      cursor: pointer;
      letter-spacing: 2px;
      transition: background 0.2s;
    }
    button:hover { background: rgba(255,255,255,0.15); }
  </style>
</head>
<body>

  <canvas id="renderCanvas"></canvas>

  <div id="powerupDisplay"></div>

  <div id="hud">Score : <span id="scoreDisplay">0</span></div>

  <div style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:200px;">
    <p style="color:#aaa;font-size:12px;text-align:center;margin-bottom:4px;">VITESSE</p>
    <div style="width:100%;height:8px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;">
        <div id="speedFill" style="height:100%;width:0%;background:#00ffcc;transition:width 0.3s;"></div>
    </div>
  </div>

  <div id="startScreen">
    <h1>RUNNER</h1>
    <p>← → pour changer de lane &nbsp;|&nbsp; ↑ ou Espace pour sauter</p>
    <button id="startBtn">JOUER</button>
  </div>

  <div id="gameoverScreen">
    <h2>GAME OVER</h2>
    <p>Score final : <span id="finalScore">0</span></p>
    <button id="restartBtn">REJOUER</button>
  </div>

  <!-- Babylon.js via CDN -->
  <script src="https://cdn.babylonjs.com/babylon.js"></script>

  <!-- Nos modules (ordre important) -->
  <script src="src/InputManager.js"></script>
  <script src="src/Player.js"></script>
  <script src="src/TileManager.js"></script>
  <script src="src/PowerUpManager.js"></script>
  <script src="src/Game.js"></script>

  <script>
    // Point d'entrée
    const canvas = document.getElementById('renderCanvas');
    const game = new Game(canvas);

    document.getElementById('startBtn').addEventListener('click', () => {
      document.getElementById('startScreen').style.display = 'none';
      game.start();
    });

    document.getElementById('restartBtn').addEventListener('click', () => {
      document.getElementById('gameoverScreen').style.display = 'none';
      game.restart();
    });
  </script>

</body>
</html>
